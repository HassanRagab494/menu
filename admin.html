<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="css/stayel.css" />
</head>
<body>

<!-- ══════════════════════════════════════
     PASSWORD GATE
══════════════════════════════════════ -->
<div class="password-gate" id="password-gate">
  <div class="password-box">
    <span class="lock-icon">🔒</span>
    <h2>لوحة التحكم</h2>
    <p>ادخلي كلمة السر عشان تكملي</p>
    <input
      type="password"
      id="inp-password"
      placeholder="● ● ● ● ● ●"
      onkeydown="handlePassKey(event)"
      autofocus
    />
    <p class="pass-error" id="pass-error">❌ كلمة السر غلط، حاولي تاني</p>
    <button class="btn btn-green w-100" onclick="checkPassword()">دخول</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     ADMIN CONTENT (hidden until auth)
══════════════════════════════════════ -->
<div id="admin-content" style="display:none">

  <!-- NAVBAR -->
  <nav class="navbar navbar-custom">
    <div class="container-fluid">
      <span class="navbar-brand">⚙️ لوحة التحكم</span>
      <a href="index.html" target="_blank" class="btn-nav-outline">👁️ شوف المنيو</a>
    </div>
  </nav>

  <div class="container py-4" style="max-width:640px">

    <!-- STATS -->
    <div class="row g-3 mb-4">
      <div class="col-4">
        <div class="stat-card">
          <div class="stat-num" id="stat-items">0</div>
          <div class="stat-lbl">صنف</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card">
          <div class="stat-num" id="stat-cats">0</div>
          <div class="stat-lbl">كاتيجوري</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card">
          <div class="stat-num" id="stat-avg">0</div>
          <div class="stat-lbl">متوسط السعر</div>
        </div>
      </div>
    </div>

    <!-- RESTAURANT INFO -->
    <div class="custom-card">
      <div class="card-title-custom">🏠 بيانات المطبخ</div>
      <div class="mb-3">
        <label class="form-label" style="font-size:13px;color:#555">اسم المطبخ</label>
        <input type="text" id="inp-resto-name" class="form-control-custom" placeholder="مثال: مطبخ أم أحمد" />
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size:13px;color:#555">وصف قصير</label>
        <input type="text" id="inp-resto-sub" class="form-control-custom" placeholder="مثال: أكل بيتي بطعم الأصل" />
      </div>
      <button class="btn btn-outline-cream w-100" onclick="saveRestoInfo()">💾 حفظ البيانات</button>
    </div>

    <!-- ADD ITEM -->
    <div class="custom-card">
      <div class="card-title-custom">➕ إضافة صنف جديد</div>
      <div class="mb-3">
        <label class="form-label" style="font-size:13px;color:#555">اسم الصنف</label>
        <input type="text" id="inp-name" class="form-control-custom" placeholder="مثال: كفتة بالصلصة" />
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label" style="font-size:13px;color:#555">السعر (جنيه)</label>
          <input type="number" id="inp-price" class="form-control-custom" placeholder="0" min="0" />
        </div>
        <div class="col-6">
          <label class="form-label" style="font-size:13px;color:#555">الكاتيجوري</label>
          <select id="inp-cat" class="form-select-custom">
            <option value="مقبلات">🥗 مقبلات</option>
            <option value="أكل رئيسي" selected>🍛 أكل رئيسي</option>
            <option value="مشروبات">🥤 مشروبات</option>
            <option value="حلويات">🍮 حلويات</option>
          </select>
        </div>
      </div>
      <button class="btn btn-green w-100" onclick="addItem()">+ إضافة للمنيو</button>
    </div>

    <!-- ITEMS LIST -->
    <div class="custom-card">
      <div class="card-title-custom">📋 الأصناف الحالية</div>
      <div id="items-list"></div>
    </div>

    <!-- EXPORT -->
    <div class="custom-card">
      <div class="card-title-custom">📤 تصدير المنيو كصورة</div>
      <div class="row g-2">
        <div class="col-6">
          <button class="btn btn-green w-100" onclick="downloadPNG()">⬇️ تحميل PNG</button>
        </div>
        <div class="col-6">
          <button class="btn btn-outline-cream w-100" onclick="copyImage()">📋 نسخ للمشاركة</button>
        </div>
      </div>
      <p class="text-center mt-2" style="font-size:12px;color:#aaa">شاركي الصورة على واتساب أو فيسبوك</p>
    </div>

  </div><!-- /container -->
</div><!-- /admin-content -->

<!-- hidden snapshot -->
<div id="snapshot-target"></div>
<!-- toast -->
<div class="toast-custom" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- ✅ التعديل: بس بنحمل App.js كـ module، من غير import -->
<script type="module" src="/js/App.js"></script>

</body>
</html>
